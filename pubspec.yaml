name: composia
description: AI-powered product ingredient analyzer for medicines, cosmetics, skincare, and more.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  http: ^1.2.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  permission_handler: ^11.3.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
